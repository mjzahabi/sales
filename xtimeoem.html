<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xtime OEM Program Matrix</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --xtime-orange: #FF570C;
    --xtime-orange-dim: #cc4500;
    --xtime-orange-glow: rgba(255, 87, 12, 0.15);
    --xtime-dark-bg: #0d0f12;
    --xtime-surface: #161a20;
    --xtime-surface2: #1e2530;
    --xtime-surface3: #252d38;
    --xtime-border: rgba(255,255,255,0.07);
    --xtime-border-active: rgba(255, 87, 12, 0.4);
    --text-primary: #f0f2f5;
    --text-secondary: #8a9ab0;
    --text-muted: #4a5568;
    --chip-bg: rgba(255,255,255,0.06);
    --chip-text: #8a9ab0;
    --tag-endorsed: #1a3a2a;
    --tag-endorsed-text: #4ade80;
    --tag-d2d: #1a2a3a;
    --tag-d2d-text: #60a5fa;
    --tag-oemco: #3a2a1a;
    --tag-oemco-text: #fb923c;
    --shadow-card: 0 2px 16px rgba(0,0,0,0.4);
    --shadow-hover: 0 8px 32px rgba(255, 87, 12, 0.12);
    --radius: 12px;
    --header-height: 72px;
  }
  .light-mode {
    --xtime-dark-bg: #f0f2f5;
    --xtime-surface: #ffffff;
    --xtime-surface2: #f7f9fc;
    --xtime-surface3: #eef1f6;
    --xtime-border: rgba(0,0,0,0.09);
    --xtime-border-active: rgba(255, 87, 12, 0.5);
    --text-primary: #1a202c;
    --text-secondary: #4a5568;
    --text-muted: #a0aec0;
    --chip-bg: rgba(0,0,0,0.05);
    --chip-text: #4a5568;
    --tag-endorsed: #dcfce7;
    --tag-endorsed-text: #166534;
    --tag-d2d: #dbeafe;
    --tag-d2d-text: #1e40af;
    --tag-oemco: #ffedd5;
    --tag-oemco-text: #9a3412;
    --shadow-card: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-hover: 0 8px 28px rgba(255, 87, 12, 0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--xtime-dark-bg);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }
  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--xtime-surface);
    border-bottom: 1px solid var(--xtime-border);
    height: var(--header-height);
    display: flex;
    align-items: center;
    padding: 0 40px;
    gap: 24px;
    backdrop-filter: blur(12px);
  }
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--xtime-orange);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -1px;
  }
  .logo-text {
    font-size: 22px;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--xtime-orange); }
  .header-divider {
    width: 1px;
    height: 28px;
    background: var(--xtime-border);
    flex-shrink: 0;
  }
  .header-subtitle {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .header-spacer { flex: 1; }
  /* US/Canada Toggle */
  .region-toggle {
    display: flex;
    background: var(--xtime-surface2);
    border: 1px solid var(--xtime-border);
    border-radius: 50px;
    padding: 4px;
    gap: 2px;
  }
  .region-btn {
    padding: 7px 20px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.02em;
    transition: all 0.2s;
    background: transparent;
    color: var(--text-secondary);
  }
  .region-btn.active {
    background: var(--xtime-orange);
    color: #fff;
    box-shadow: 0 2px 8px rgba(255,87,12,0.35);
  }
  /* Dark mode toggle */
  .dark-toggle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid var(--xtime-border);
    background: var(--xtime-surface2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .dark-toggle:hover { border-color: var(--xtime-orange); background: var(--xtime-orange-glow); }
  .dark-toggle svg { width: 18px; height: 18px; }
  /* MAIN LAYOUT */
  .main-wrap {
    max-width: 1600px;
    margin: 0 auto;
    padding: 32px 40px;
  }
  /* STATS BAR */
  .stats-bar {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 28px;
  }
  .stat-pill {
    background: var(--xtime-surface);
    border: 1px solid var(--xtime-border);
    border-radius: 50px;
    padding: 8px 16px;
    font-size: 13px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stat-pill strong {
    color: var(--xtime-orange);
    font-weight: 700;
  }
  .search-wrap {
    flex: 1;
    max-width: 360px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: var(--text-muted);
  }
  .search-input {
    width: 100%;
    background: var(--xtime-surface);
    border: 1px solid var(--xtime-border);
    border-radius: 50px;
    padding: 9px 16px 9px 40px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--xtime-orange); }
  /* OEM GRID */
  .oem-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  /* OEM CARD */
  .oem-card {
    background: var(--xtime-surface);
    border: 1px solid var(--xtime-border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-card);
    transition: all 0.25s;
    cursor: pointer;
  }
  .oem-card:hover {
    border-color: var(--xtime-border-active);
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }
  .oem-card.expanded { border-color: var(--xtime-border-active); }
  .card-header {
    padding: 20px 20px 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .oem-avatar-img {
    background: #fff !important;
    border-color: rgba(255,255,255,0.15) !important;
  }
  .light-mode .oem-avatar-img {
    background: #f7f9fc !important;
    border-color: rgba(0,0,0,0.1) !important;
  }
  .oem-avatar {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--xtime-surface2), var(--xtime-surface3));
    border: 1px solid var(--xtime-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 800;
    color: var(--xtime-orange);
    letter-spacing: -0.5px;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  .card-title-wrap { flex: 1; min-width: 0; }
  .card-oem-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }
  .card-program-name {
    font-size: 12px;
    color: var(--xtime-orange);
    font-weight: 500;
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-manager {
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 3px;
  }
  .expand-icon {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--xtime-surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.25s, background 0.2s;
  }
  .oem-card.expanded .expand-icon { transform: rotate(180deg); background: var(--xtime-orange-glow); }
  .expand-icon svg { width: 14px; height: 14px; color: var(--text-secondary); }
  /* PRODUCT CHIPS */
  .product-row {
    padding: 0 20px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .prod-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 50px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    border: 1px solid transparent;
  }
  .prod-chip.active {
    background: rgba(255,87,12,0.12);
    border-color: rgba(255,87,12,0.25);
    color: var(--xtime-orange);
  }
  .prod-chip.inactive {
    background: var(--chip-bg);
    color: var(--text-muted);
    border-color: transparent;
  }
  .prod-chip .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
  }
  /* MARKETING TAG */
  .marketing-tag {
    margin: 0 20px 14px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
  }
  .marketing-tag.restrict {
    background: rgba(239,68,68,0.12);
    color: #f87171;
    border: 1px solid rgba(239,68,68,0.2);
  }
  .marketing-tag.ok {
    background: var(--tag-endorsed);
    color: var(--tag-endorsed-text);
    border: 1px solid rgba(74,222,128,0.2);
  }
  /* EXPANDED DETAIL */
  .card-detail {
    display: none;
    border-top: 1px solid var(--xtime-border);
    padding: 0;
  }
  .oem-card.expanded .card-detail { display: block; }
  .detail-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--xtime-border);
  }
  .detail-section:last-child { border-bottom: none; }
  .detail-section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .detail-item { display: flex; flex-direction: column; gap: 3px; }
  .detail-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
  }
  .detail-val {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: break-word;
  }
  .detail-val.highlight { color: var(--text-primary); }
  .detail-val a {
    color: var(--xtime-orange);
    text-decoration: none;
  }
  .detail-val a:hover { text-decoration: underline; }
  /* Product detail tags */
  .prod-detail-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .prod-detail-item {
    background: var(--xtime-surface2);
    border: 1px solid var(--xtime-border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .prod-detail-name {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 5px;
  }
  .prod-detail-val {
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.4;
    word-break: break-word;
    overflow-wrap: break-word;
  }
  .prod-detail-item.has-value {
    border-color: rgba(255,87,12,0.2);
    background: rgba(255,87,12,0.04);
  }
  .prod-detail-item.has-value .prod-detail-name { color: var(--xtime-orange); }
  .prod-detail-item.has-value .prod-detail-val { color: var(--text-primary); }
  /* Tag pills for integrations */
  .int-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--tag-endorsed);
    color: var(--tag-endorsed-text);
    border: 1px solid rgba(74,222,128,0.15);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 500;
    margin: 2px;
    max-width: 100%;
    word-break: break-word;
    overflow-wrap: break-word;
  }
  .int-tag.no {
    background: var(--chip-bg);
    color: var(--text-muted);
    border-color: transparent;
  }
  /* EMPTY STATE */
  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
    font-size: 15px;
  }
  .empty-state svg { width: 40px; height: 40px; margin-bottom: 16px; opacity: 0.3; }
  /* FOOTER */
  footer {
    text-align: center;
    padding: 24px 40px;
    font-size: 11px;
    color: var(--text-muted);
    border-top: 1px solid var(--xtime-border);
    margin-top: 40px;
  }
  /* HIDDEN */
  .hidden { display: none !important; }
</style>
</head>

const PRODUCTS = ['invite','schedule','engage','inspect','multimedia','text','payment'];
const PRODUCT_LABELS = {
  invite: 'Invite', schedule: 'Schedule', engage: 'Engage',
  inspect: 'Inspect', multimedia: 'Multimedia', text: 'Text', payment: 'Payment'
};
const INTEGRATIONS = [
  ['recall_integration','Recall'],['vehicle_details','Vehicle Details'],
  ['warranty','Warranty'],['service_marketing','Service Mktg'],
  ['owner_portal','Owner Portal'],['custom_mpi','Custom MPI'],
  ['telematics','Telematics'],['tire','Tire'],
  ['call_center','Call Center'],['branded_portal','Branded Portal'],
];

let currentRegion = 'us';

function setRegion(r) {
  currentRegion = r;
  document.getElementById('btn-us').classList.toggle('active', r === 'us');
  document.getElementById('btn-canada').classList.toggle('active', r === 'canada');
  const data = DATA[r];
  document.getElementById('oem-count').textContent = data.length;
  document.getElementById('region-label').textContent = r === 'us' ? 'United States Programs' : 'Canada Programs';
  document.getElementById('search').value = '';
  renderCards(data);
}

function hasValue(v) {
  return v && v.toLowerCase() !== '' && v.toLowerCase() !== 'nan';
}

function isNo(v) {
  if (!v) return true;
  const lv = v.toLowerCase().trim();
  return lv === 'no' || lv === 'n/a' || lv === 'not applicable' || lv === 'nan' || lv === '';
}

function isYes(v) {
  if (!v) return false;
  const lv = v.toLowerCase().trim();
  return lv.startsWith('yes') || lv.startsWith('d2d') || lv.startsWith('oem');
}

function formatIntTag(label, val) {
  if (!val || isNo(val)) {
    return `<span class="int-tag no">${label}: —</span>`;
  }
  const short = val.length > 50 ? val.substring(0, 48) + '…' : val;
  return `<span class="int-tag" title="${escHtml(val)}">${label}: ${escHtml(short)}</span>`;
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getInitials(name) {
  return name.split(/[\s\/\-]+/).map(w => w[0]).join('').substring(0, 3).toUpperCase();
}

function formatDate(d) {
  if (!d) return '';
  const m = d.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return d;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m[2])-1]} ${parseInt(m[3])}, ${m[1]}`;
}

function buildCard(oem) {
  const initials = getInitials(oem.oem);
  const logoB64 = LOGOS[oem.oem] || null;
  const programName = oem.program_name && oem.program_name.length < 60 ? oem.program_name : (oem.program_name ? oem.program_name.substring(0, 58) + '…' : '');
  const marketingRestricted = oem.marketing_rules && oem.marketing_rules.toLowerCase().includes('do not') || oem.marketing_rules && oem.marketing_rules.toLowerCase().includes('approval required');
  const marketingTag = oem.marketing_rules ? `
    <div class="marketing-tag ${marketingRestricted ? 'restrict' : 'ok'}">
      ${marketingRestricted ? '⚠' : '✓'} ${escHtml(oem.marketing_rules.length > 40 ? oem.marketing_rules.substring(0,38)+'…' : oem.marketing_rules)}
    </div>` : '';

  const productChips = PRODUCTS.map(p => {
    const val = oem[p];
    const active = hasValue(val);
    return `<span class="prod-chip ${active ? 'active' : 'inactive'}">
      <span class="dot"></span>${PRODUCT_LABELS[p]}
    </span>`;
  }).join('');

  // Product detail blocks
  const prodDetails = PRODUCTS.map(p => {
    const val = oem[p];
    const has = hasValue(val);
    const displayVal = val ? val.replace(/\\n/g, '\n') : '—';
    return `<div class="prod-detail-item ${has ? 'has-value' : ''}">
      <div class="prod-detail-name">${PRODUCT_LABELS[p]}</div>
      <div class="prod-detail-val">${escHtml(displayVal.substring(0, 120))}${displayVal.length > 120 ? '…' : ''}</div>
    </div>`;
  }).join('');

  // Integrations
  const integrationTags = INTEGRATIONS.map(([k, label]) => formatIntTag(label, oem[k])).join('');

  // Key info items
  const keyInfoItems = [
    oem.coop_incentives ? `<div class="detail-item"><div class="detail-label">Co-Op & Incentives</div><div class="detail-val">${escHtml(oem.coop_incentives.substring(0,200))}${oem.coop_incentives.length > 200 ? '…' : ''}</div></div>` : '',
    oem.competition ? `<div class="detail-item"><div class="detail-label">Competition</div><div class="detail-val">${escHtml(oem.competition.substring(0,200))}${oem.competition.length > 200 ? '…' : ''}</div></div>` : '',
    oem.enrollment ? `<div class="detail-item"><div class="detail-label">Enrollment Process</div><div class="detail-val">${escHtml(oem.enrollment.substring(0,200))}${oem.enrollment.length > 200 ? '…' : ''}</div></div>` : '',
    oem.pkg_bundles ? `<div class="detail-item"><div class="detail-label">Packages / Bundles</div><div class="detail-val">${escHtml(oem.pkg_bundles.substring(0,200))}${oem.pkg_bundles.length > 200 ? '…' : ''}</div></div>` : '',
    oem.other_rules ? `<div class="detail-item"><div class="detail-label">Other Rules</div><div class="detail-val">${escHtml(oem.other_rules.substring(0,200))}${oem.other_rules.length > 200 ? '…' : ''}</div></div>` : '',
    oem.sponsored_dpc ? `<div class="detail-item"><div class="detail-label">Sponsored DPC</div><div class="detail-val highlight">${escHtml(oem.sponsored_dpc)}</div></div>` : '',
    oem.brochure_link && oem.brochure_link.toLowerCase() !== 'no' ? `<div class="detail-item"><div class="detail-label">Brochure</div><div class="detail-val"><a href="${escHtml(oem.brochure_link)}" target="_blank" onclick="event.stopPropagation()">View Brochure →</a></div></div>` : '',
    oem.off_program_integrations ? `<div class="detail-item"><div class="detail-label">Off-Program Integrations</div><div class="detail-val">${escHtml(oem.off_program_integrations.substring(0,150))}${oem.off_program_integrations.length > 150 ? '…' : ''}</div></div>` : '',
    oem.custom_integrations ? `<div class="detail-item"><div class="detail-label">Custom Integrations</div><div class="detail-val">${escHtml(oem.custom_integrations.substring(0,200))}${oem.custom_integrations.length > 200 ? '…' : ''}</div></div>` : '',
    oem.other_sites ? `<div class="detail-item"><div class="detail-label">Other OEM Sites</div><div class="detail-val">${escHtml(oem.other_sites.substring(0,200))}${oem.other_sites.length > 200 ? '…' : ''}</div></div>` : '',
  ].filter(x => x).join('');

  const lastUpdate = formatDate(oem.last_update);
  const manager = oem.program_manager || '—';
  const partnerPlus = oem.partner_plus || '—';

  return `
    <div class="oem-card" onclick="toggleCard(this)" data-search="${escHtml((oem.oem + ' ' + oem.program_name + ' ' + oem.program_manager).toLowerCase())}">
      <div class="card-header">
        ${logoB64
        ? `<div class="oem-avatar oem-avatar-img"><img src="data:image/png;base64,${logoB64}" alt="${escHtml(oem.oem)}" style="width:100%;height:100%;object-fit:contain;padding:4px;"></div>`
        : `<div class="oem-avatar">${escHtml(initials)}</div>`
      }
        <div class="card-title-wrap">
          <div class="card-oem-name">${escHtml(oem.oem)}</div>
          ${programName ? `<div class="card-program-name">${escHtml(programName)}</div>` : ''}
          <div class="card-manager">PM: ${escHtml(manager)} &nbsp;|&nbsp; PP: ${escHtml(partnerPlus)}</div>
        </div>
        <div class="expand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>
      ${marketingTag}
      <div class="product-row">${productChips}</div>
      <div class="card-detail">
        <div class="detail-section">
          <div class="detail-section-title">Product Details</div>
          <div class="prod-detail-grid">${prodDetails}</div>
        </div>
        ${keyInfoItems ? `<div class="detail-section"><div class="detail-section-title">Program Rules & Details</div><div class="detail-grid">${keyInfoItems}</div></div>` : ''}
        <div class="detail-section">
          <div class="detail-section-title">Integrations</div>
          <div>${integrationTags}</div>
        </div>
        <div class="detail-section">
          <div class="detail-grid">
            <div class="detail-item"><div class="detail-label">Last Updated</div><div class="detail-val highlight">${escHtml(lastUpdate)}</div></div>
            ${oem.branded_portal ? `<div class="detail-item"><div class="detail-label">Branded Consumer Portal</div><div class="detail-val">${escHtml(oem.branded_portal)}</div></div>` : ''}
            ${oem.branded_notif_available ? `<div class="detail-item"><div class="detail-label">Branded Notifications</div><div class="detail-val">${escHtml(oem.branded_notif_available)}</div></div>` : ''}
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderCards(data) {
  const grid = document.getElementById('oem-grid');
  if (!data || data.length === 0) {
    grid.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><br>No OEMs found</div>`;
    return;
  }
  grid.innerHTML = data.map(buildCard).join('');
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const cards = document.querySelectorAll('.oem-card');
  let visible = 0;
  cards.forEach(c => {
    const match = !q || c.dataset.search.includes(q);
    c.classList.toggle('hidden', !match);
    if (match) visible++;
  });
  document.getElementById('oem-count').textContent = visible;
}

function toggleCard(card) {
  card.classList.toggle('expanded');
}

function toggleDark() {
  document.body.classList.toggle('light-mode');
  const isLight = document.body.classList.contains('light-mode');
  document.querySelector('.logo-dark-mode').style.display = isLight ? 'none' : 'block';
  document.querySelector('.logo-light-mode').style.display = isLight ? 'block' : 'none';
  const icon = document.getElementById('dark-icon');
  if (document.body.classList.contains('light-mode')) {
    icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  } else {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  }
}

// Init
renderCards(DATA.us);
</script>
</body>
