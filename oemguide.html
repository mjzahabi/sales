<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OEM Co-Op &amp; Program Guide — Cox Automotive</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --trust-blue:#1D3E74; --joyride-blue:#024AA5; --power-blue:#0C80DF;
    --impact-orange:#FF8210; --energy-aqua:#00BCDD;
    --platinum:#EEEEEF; --silver:#CCCCCE; --aluminum:#A7A9AC; --steel:#808285; --asphalt:#55575C;

    --bg-primary:#F4F5F7; --bg-card:#FFFFFF; --bg-row-alt:#F8F9FB; --bg-summary:#EEF4FB;
    --bg-filter-bar:#FFFFFF; --bg-chip:#EEEEEF; --bg-chip-active:#0C80DF; --bg-search:#F0F1F3;
    --text-primary:#1A1D23; --text-secondary:#55575C; --text-muted:#808285;
    --text-chip:#55575C; --text-chip-active:#FFFFFF;
    --border-card:#E2E4E8; --border-table:#E8EAF0;
    --shadow-card:0 1px 3px rgba(29,62,116,.08),0 1px 2px rgba(29,62,116,.06);
    --shadow-card-hover:0 4px 12px rgba(29,62,116,.12);
    --badge-bg:#E8F4FD; --badge-text:#024AA5;
    --badge-orange-bg:#FFF3E5; --badge-orange-text:#CC6800;
    --badge-aqua-bg:#E5F8FC; --badge-aqua-text:#007A91;
    --badge-green-bg:#E6F9ED; --badge-green-text:#1A7A3A;
    --badge-purple-bg:#F0E8FD; --badge-purple-text:#6B21A8;
    --counter-bg:#0C80DF; --counter-text:#FFFFFF;
    --cat-bg:#F0F4F8; --cat-border:#D8DFE8; --cat-text:#1D3E74;
    --prog-bg:#FAFBFD; --prog-border:#E2E8F0;
    --scrollbar-thumb:#CCCCCE; --scrollbar-track:#EEEEEF;
  }
  [data-theme="dark"] {
    --bg-primary:#0D1117; --bg-card:#161B22; --bg-row-alt:#1C2330; --bg-summary:#12253A;
    --bg-filter-bar:#161B22; --bg-chip:#21262D; --bg-chip-active:#0C80DF; --bg-search:#21262D;
    --text-primary:#E6EDF3; --text-secondary:#9EAAB8; --text-muted:#6E7A88;
    --text-chip:#9EAAB8; --text-chip-active:#FFFFFF;
    --border-card:#2A3140; --border-table:#252C38;
    --shadow-card:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
    --shadow-card-hover:0 4px 16px rgba(0,0,0,.4);
    --badge-bg:#12253A; --badge-text:#5BAADF;
    --badge-orange-bg:#2A1F0F; --badge-orange-text:#FFB060;
    --badge-aqua-bg:#0A2229; --badge-aqua-text:#40D4ED;
    --badge-green-bg:#0F2618; --badge-green-text:#4ADE80;
    --badge-purple-bg:#1A102A; --badge-purple-text:#C084FC;
    --counter-bg:#0C80DF; --counter-text:#FFFFFF;
    --cat-bg:#1A2332; --cat-border:#253040; --cat-text:#5BAADF;
    --prog-bg:#141A24; --prog-border:#253040;
    --scrollbar-thumb:#2A3140; --scrollbar-track:#161B22;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scrollbar-color:var(--scrollbar-thumb) var(--scrollbar-track)}
  body{font-family:'Barlow',Arial,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;transition:background .3s,color .3s}
  .container{max-width:1600px;margin:0 auto;padding:0 24px 60px}

  .page-header{background:linear-gradient(135deg,var(--trust-blue) 0%,var(--joyride-blue) 60%,var(--power-blue) 100%);padding:28px 0 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}
  .header-inner{max-width:1600px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
  .header-left{display:flex;align-items:baseline;gap:16px}
  .header-title{font-family:'Barlow Condensed','Barlow',Arial,sans-serif;font-weight:700;font-size:26px;color:#FFF;letter-spacing:.02em;text-transform:uppercase}
  .header-subtitle{font-size:14px;color:rgba(255,255,255,.6);font-weight:500}
  .header-badge{background:var(--impact-orange);color:#FFF;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.05em;text-transform:uppercase}
  .dark-toggle{width:40px;height:40px;border-radius:10px;border:none;background:rgba(255,255,255,.12);color:#FFF;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
  .dark-toggle:hover{background:rgba(255,255,255,.22)}
  .dark-toggle svg{width:20px;height:20px}

  .filter-bar{background:var(--bg-filter-bar);border:1px solid var(--border-card);border-radius:14px;padding:20px 24px;margin-top:24px;box-shadow:var(--shadow-card);transition:background .3s,border .3s}
  .filter-sections{display:flex;flex-direction:column;gap:14px}
  .filter-row{display:flex;align-items:flex-start;gap:24px}
  .filter-group{flex:1}
  .filter-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .filter-count{font-size:10px;background:var(--counter-bg);color:var(--counter-text);padding:1px 7px;border-radius:10px;font-weight:600}
  .chip-wrap{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-family:'Barlow',Arial,sans-serif;font-size:13px;font-weight:600;padding:5px 14px;border-radius:8px;border:1px solid var(--border-card);background:var(--bg-chip);color:var(--text-chip);cursor:pointer;transition:all .15s;user-select:none}
  .chip:hover{border-color:var(--power-blue);color:var(--power-blue)}
  .chip.active{background:var(--bg-chip-active);color:var(--text-chip-active);border-color:var(--bg-chip-active)}
  .chip.active[data-brand="DDC"]{background:#FF821C;border-color:#FF821C;color:#FFF}
  .chip.active[data-brand="Listings"]{background:#012169;border-color:#012169;color:#FFF}
  .chip.active[data-brand="VinSolutions/AMP"]{background:#00BCDD;border-color:#00BCDD;color:#FFF}
  .chip.active[data-brand="Trade Tools"]{background:#FF821C;border-color:#FF821C;color:#FFF}
  .chip.active[data-brand="xTime"]{background:#FF570C;border-color:#FF570C;color:#FFF}
  .chip.active[data-brand="Dealertrack DMS"]{background:#07124A;border-color:#07124A;color:#FFF}
  .chip[data-brand="DDC"]:not(.active):hover{border-color:#FF821C;color:#FF821C}
  .chip[data-brand="Listings"]:not(.active):hover{border-color:#012169;color:#012169}
  .chip[data-brand="VinSolutions/AMP"]:not(.active):hover{border-color:#00BCDD;color:#00849E}
  .chip[data-brand="Trade Tools"]:not(.active):hover{border-color:#FF821C;color:#FF821C}
  .chip[data-brand="xTime"]:not(.active):hover{border-color:#FF570C;color:#FF570C}
  .chip[data-brand="Dealertrack DMS"]:not(.active):hover{border-color:#07124A;color:#07124A}
  [data-theme="dark"] .chip.active[data-brand="Listings"]{background:#1A4A99;border-color:#1A4A99}
  [data-theme="dark"] .chip[data-brand="Listings"]:not(.active):hover{border-color:#5586D4;color:#5586D4}
  [data-theme="dark"] .chip[data-brand="VinSolutions/AMP"]:not(.active):hover{color:#00BCDD}
  [data-theme="dark"] .chip.active[data-brand="Dealertrack DMS"]{background:#1A3070;border-color:#1A3070}
  .chip-all{font-style:italic;opacity:.85}
  .view-chip.active[data-view="coop"]{background:#1A7A3A;border-color:#1A7A3A;color:#FFF}
  .view-chip.active[data-view="cert"]{background:#6B21A8;border-color:#6B21A8;color:#FFF}
  [data-theme="dark"] .view-chip.active[data-view="coop"]{background:#15803D}
  [data-theme="dark"] .view-chip.active[data-view="cert"]{background:#7C3AED}
  .search-box{min-width:220px;max-width:280px}
  .search-input{font-family:'Barlow',Arial,sans-serif;font-size:14px;padding:8px 14px;border-radius:8px;border:1px solid var(--border-card);background:var(--bg-search);color:var(--text-primary);width:100%;outline:none;transition:border .2s,background .3s}
  .search-input::placeholder{color:var(--text-muted)}
  .search-input:focus{border-color:var(--power-blue)}

  .stats-bar{display:flex;align-items:center;justify-content:space-between;margin-top:20px;padding:0 4px}
  .stats-text{font-size:13px;color:var(--text-muted);font-weight:500}
  .stats-text strong{color:var(--text-primary);font-weight:700}
  .btn-expand-all{font-family:'Barlow',Arial,sans-serif;font-size:12px;font-weight:600;padding:5px 14px;border-radius:6px;border:1px solid var(--border-card);background:var(--bg-card);color:var(--text-secondary);cursor:pointer;transition:all .15s}
  .btn-expand-all:hover{border-color:var(--power-blue);color:var(--power-blue)}

  .oem-grid{margin-top:16px;display:flex;flex-direction:column;gap:12px}
  .oem-card{background:var(--bg-card);border:1px solid var(--border-card);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-card);transition:box-shadow .2s,background .3s,border .3s}
  .oem-card:hover{box-shadow:var(--shadow-card-hover)}
  .oem-card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;cursor:pointer;user-select:none;gap:16px}
  .oem-card-header:hover{background:var(--bg-row-alt)}
  .oem-name-area{display:flex;align-items:center;gap:14px;flex:1;min-width:0}
  .oem-name{font-family:'Barlow Condensed','Barlow',Arial,sans-serif;font-weight:700;font-size:18px;letter-spacing:.04em;text-transform:uppercase;color:var(--text-primary);white-space:nowrap}
  .oem-meta-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .meta-badge{font-size:11px;font-weight:600;padding:2px 10px;border-radius:6px;white-space:nowrap}
  .meta-badge.bu-count{background:var(--badge-bg);color:var(--badge-text)}
  .meta-badge.bu-count[data-brand="DDC"]{background:#FF821C;color:#FFF}
  .meta-badge.bu-count[data-brand="Listings"]{background:#012169;color:#FFF}
  .meta-badge.bu-count[data-brand="VinSolutions/AMP"]{background:#00BCDD;color:#FFF}
  .meta-badge.bu-count[data-brand="Trade Tools"]{background:#FF821C;color:#FFF}
  .meta-badge.bu-count[data-brand="xTime"]{background:#FF570C;color:#FFF}
  .meta-badge.bu-count[data-brand="Dealertrack DMS"]{background:#07124A;color:#FFF}
  [data-theme="dark"] .meta-badge.bu-count[data-brand="Listings"]{background:#1A4A99}
  [data-theme="dark"] .meta-badge.bu-count[data-brand="VinSolutions/AMP"]{background:#009CB8}
  [data-theme="dark"] .meta-badge.bu-count[data-brand="Dealertrack DMS"]{background:#1A3070}
  .oem-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
  .product-count{font-size:12px;font-weight:600;color:var(--text-muted)}
  .chevron{width:20px;height:20px;color:var(--text-muted);transition:transform .25s;flex-shrink:0}
  .oem-card.open .chevron{transform:rotate(180deg)}

  .oem-card-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
  .oem-card.open .oem-card-body{max-height:80000px}

  .bu-section{border-top:1px solid var(--border-table)}
  .bu-header{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--bg-summary);font-size:13px;font-weight:700;color:var(--text-primary);text-transform:uppercase;letter-spacing:.04em;cursor:pointer;user-select:none;border-left:4px solid transparent}
  .bu-header:hover{filter:brightness(.97)}
  .bu-header[data-brand="DDC"]{border-left-color:#FF821C}
  .bu-header[data-brand="Listings"]{border-left-color:#012169}
  .bu-header[data-brand="VinSolutions/AMP"]{border-left-color:#00BCDD}
  .bu-header[data-brand="Trade Tools"]{border-left-color:#FF821C}
  .bu-header[data-brand="xTime"]{border-left-color:#FF570C}
  .bu-header[data-brand="Dealertrack DMS"]{border-left-color:#07124A}
  [data-theme="dark"] .bu-header[data-brand="Listings"]{border-left-color:#5586D4}
  [data-theme="dark"] .bu-header[data-brand="Dealertrack DMS"]{border-left-color:#5586D4}
  .bu-chevron{width:14px;height:14px;color:var(--text-muted);transition:transform .2s;flex-shrink:0}
  .bu-section.open .bu-chevron{transform:rotate(180deg)}
  .bu-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
  .bu-section.open .bu-body{max-height:50000px}
  .bu-badge{font-size:10px;font-weight:600;padding:1px 8px;border-radius:4px;background:var(--counter-bg);color:var(--counter-text);margin-left:auto}
  .bu-badge[data-brand="DDC"]{background:#FF821C}
  .bu-badge[data-brand="Listings"]{background:#012169}
  .bu-badge[data-brand="VinSolutions/AMP"]{background:#00BCDD}
  .bu-badge[data-brand="Trade Tools"]{background:#FF821C}
  .bu-badge[data-brand="xTime"]{background:#FF570C}
  .bu-badge[data-brand="Dealertrack DMS"]{background:#07124A}
  [data-theme="dark"] .bu-badge[data-brand="Listings"]{background:#1A4A99}
  [data-theme="dark"] .bu-badge[data-brand="VinSolutions/AMP"]{background:#009CB8}
  [data-theme="dark"] .bu-badge[data-brand="Dealertrack DMS"]{background:#1A3070}

  /* Program card */
  .prog-card{margin:8px 16px 12px 16px;background:var(--prog-bg);border:1px solid var(--prog-border);border-radius:10px;padding:14px 18px;font-size:13px;line-height:1.55}
  .prog-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .prog-status{font-weight:700;color:var(--text-primary);font-size:13px}
  .prog-cert-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em}
  .cert-endorsed{background:var(--badge-green-bg);color:var(--badge-green-text)}
  .cert-certified{background:var(--badge-bg);color:var(--badge-text)}
  .cert-exclusive{background:var(--badge-purple-bg);color:var(--badge-purple-text)}
  .cert-coop{background:var(--badge-green-bg);color:var(--badge-green-text)}
  .cert-d2d{background:var(--badge-orange-bg);color:var(--badge-orange-text)}
  .prog-coop-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:var(--badge-green-bg);color:var(--badge-green-text);text-transform:uppercase;letter-spacing:.04em}
  .prog-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px;margin-top:6px}
  .prog-section-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
  .prog-products{display:flex;flex-wrap:wrap;gap:4px}
  .prog-prod-chip{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--bg-chip);color:var(--text-secondary);border:1px solid var(--border-card)}
  .prog-prod-chip.coop-prod{background:var(--badge-green-bg);color:var(--badge-green-text);border-color:transparent}
  .prog-details{color:var(--text-secondary);font-size:12px;line-height:1.5;margin-top:8px;padding-top:8px;border-top:1px solid var(--border-table)}
  .prog-benefits{list-style:none;padding:0;margin:0}
  .prog-benefits li{font-size:12px;color:var(--text-secondary);padding:1px 0}
  .prog-benefits li::before{content:"→ ";color:var(--text-muted)}
  .prog-integrations{font-size:12px;color:var(--text-secondary)}

  /* Category & table */
  .cat-header{padding:7px 20px 7px 36px;font-size:11px;font-weight:700;color:var(--cat-text);text-transform:uppercase;letter-spacing:.06em;background:var(--cat-bg);border-top:1px solid var(--cat-border)}
  .product-table{width:100%;border-collapse:collapse;font-size:13px}
  .product-table thead th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding:8px 16px;border-bottom:1px solid var(--border-table);text-align:left;background:var(--bg-row-alt)}
  .product-table tbody tr{transition:background .1s}
  .product-table tbody tr:hover{background:var(--bg-row-alt)}
  .product-table td{padding:7px 16px;border-bottom:1px solid var(--border-table);color:var(--text-secondary);vertical-align:top;line-height:1.4}
  .product-table td:first-child{font-weight:600;color:var(--text-primary)}
  .product-table td.reimb-cell{font-weight:700;color:var(--text-primary)}
  .cell-tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--badge-bg);color:var(--badge-text)}
  .cell-tag.orange{background:var(--badge-orange-bg);color:var(--badge-orange-text)}
  .cell-na{color:var(--text-muted);font-style:italic;font-size:12px}
  .updated-cell{font-size:12px;color:var(--text-muted);font-variant-numeric:tabular-nums}

  .no-results{text-align:center;padding:60px 20px;color:var(--text-muted)}
  .no-results-icon{font-size:40px;margin-bottom:12px;opacity:.4}
  .page-footer{text-align:center;padding:32px 0 8px;font-size:11px;color:var(--text-muted)}

  @media(max-width:900px){
    .filter-row{flex-direction:column;gap:12px}
    .search-box{max-width:100%}
    .oem-meta-badges{display:none}
    .prog-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="header-inner">
    <div class="header-left">
      <span class="header-title">OEM Co-Op &amp; Program Guide</span>
      <span class="header-badge">Internal</span>
      <span class="header-subtitle">MSS Quick Reference</span>
    </div>
    <button class="dark-toggle" id="darkToggle" aria-label="Toggle dark mode">
      <svg id="sunIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg id="moonIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
  </div>
</div>

<div class="container">
  <div class="filter-bar">
    <div class="filter-sections">
      <div class="filter-row">
        <div class="filter-group">
          <div class="filter-label">Product Line <span class="filter-count" id="buCount">All</span></div>
          <div class="chip-wrap" id="buChips"></div>
        </div>
        <div class="filter-group" style="max-width:320px">
          <div class="filter-label">View</div>
          <div class="chip-wrap" id="viewChips"></div>
        </div>
        <div class="search-box">
          <div class="filter-label">Search</div>
          <input type="text" class="search-input" id="searchInput" placeholder="Keyword filter...">
        </div>
      </div>
      <div class="filter-row">
        <div class="filter-group">
          <div class="filter-label">OEM Brand <span class="filter-count" id="oemCount">All</span></div>
          <div class="chip-wrap" id="oemChips"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stats-text" id="statsText">Loading...</div>
    <button class="btn-expand-all" id="expandAllBtn">Expand All</button>
  </div>

  <div class="oem-grid" id="oemGrid"></div>
  <div class="no-results" id="noResults" style="display:none">
    <div class="no-results-icon">&#128269;</div>
    <div>No matching programs found. Adjust your filters above.</div>
  </div>
  <div class="page-footer">&copy;2025 Cox Automotive. All Rights Reserved. &mdash; Internal use only.</div>

// Collect all OEMs from both datasets

PROG_DATA.forEach(r => allOEMSet.add(r.oem));
const ALL_OEMS = [...allOEMSet].sort();

let activeBUs = new Set();
let activeOEMs = new Set();
let viewMode = 'all'; // 'all', 'coop', 'cert'
let searchTerm = '';
let allExpanded = false;

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// Normalize OEM for cross-matching
function normOEM(s){ return s.toUpperCase().replace(/[^A-Z0-9 ]/g,'').trim() }

// ── CHIPS ──
function makeChips(wrapId,items,fn){
  const w=document.getElementById(wrapId);
  const a=document.createElement('span');a.className='chip chip-all active';a.textContent='All';a.dataset.value='__all__';
  a.addEventListener('click',()=>fn('__all__'));w.appendChild(a);
  items.forEach(item=>{
    const c=document.createElement('span');c.className='chip';c.textContent=item;c.dataset.value=item;c.dataset.brand=item;
    c.addEventListener('click',()=>fn(item));w.appendChild(c);
  });
}
function makeViewChips(){
  const w=document.getElementById('viewChips');
  [['all','All'],['coop','Co-op Products'],['cert','Program & Cert']].forEach(([val,label])=>{
    const c=document.createElement('span');
    c.className='chip view-chip'+(val==='all'?' active':'');
    c.textContent=label;c.dataset.view=val;
    c.addEventListener('click',()=>{
      viewMode=val;
      w.querySelectorAll('.chip').forEach(ch=>ch.classList.toggle('active',ch.dataset.view===val));
      render();
    });
    w.appendChild(c);
  });
}

function toggleBU(v){
  if(v==='__all__')activeBUs.clear();
  else{if(activeBUs.has(v))activeBUs.delete(v);else activeBUs.add(v)}
  syncChips('buChips',activeBUs);
  document.getElementById('buCount').textContent=activeBUs.size===0?'All':activeBUs.size;
  render();
}
function toggleOEM(v){
  if(v==='__all__')activeOEMs.clear();
  else{if(activeOEMs.has(v))activeOEMs.delete(v);else activeOEMs.add(v)}
  syncChips('oemChips',activeOEMs);
  document.getElementById('oemCount').textContent=activeOEMs.size===0?'All':activeOEMs.size;
  render();
}
function syncChips(wId,set){
  document.getElementById(wId).querySelectorAll('.chip').forEach(c=>{
    const v=c.dataset.value;c.classList.toggle('active',v==='__all__'?set.size===0:set.has(v));
  });
}

// ── FILTER ──
function matchSearch(fields){
  if(!searchTerm)return true;
  const s=searchTerm.toLowerCase();
  return fields.join(' ').toLowerCase().includes(s);
}

function getFilteredCoop(){
  if(viewMode==='cert')return[];
  return COOP_DATA.filter(r=>{
    if(activeBUs.size>0&&!activeBUs.has(r.bu))return false;
    if(activeOEMs.size>0&&!activeOEMs.has(r.oem))return false;
    return matchSearch([r.oem,r.bu,r.category,r.product,r.reimbursement,r.level_of_service,r.graphic_type,r.certified_program]);
  });
}

function getFilteredProg(){
  if(viewMode==='coop')return[];
  return PROG_DATA.filter(p=>{
    if(activeBUs.size>0&&!activeBUs.has(p.bu))return false;
    if(activeOEMs.size>0&&!activeOEMs.has(p.oem))return false;
    const prodStr=p.products?Object.entries(p.products).map(([k,v])=>k+' '+v).join(' '):'';
    const coopStr=p.coopDetails||'';
    return matchSearch([p.oem,p.bu,p.status||'',p.cert||'',prodStr,coopStr]);
  });
}

// ── RENDER ──
function render(){
  const coop=getFilteredCoop();
  const progs=getFilteredProg();
  const grid=document.getElementById('oemGrid');
  const noRes=document.getElementById('noResults');

  // Build unified OEM → BU structure
  const oemMap={};

  coop.forEach(r=>{
    if(!oemMap[r.oem])oemMap[r.oem]={};
    if(!oemMap[r.oem][r.bu])oemMap[r.oem][r.bu]={coop:{},progs:[]};
    if(!oemMap[r.oem][r.bu].coop[r.category])oemMap[r.oem][r.bu].coop[r.category]=[];
    oemMap[r.oem][r.bu].coop[r.category].push(r);
  });

  progs.forEach(p=>{

    if(!oemMap[p.oem][p.bu])oemMap[p.oem][p.bu]={coop:{},progs:[]};
    oemMap[p.oem][p.bu].progs.push(p);
  });

  const sortedOEMs=Object.keys(oemMap).sort();

    html+=`</div></div><div class="oem-card-body">`;

    for(const bu of busForOem){
      const buData=buMap[bu];

      const totalLabel=[];
      if(hasCoop)totalLabel.push(coopTotal+' co-op');
      if(hasProg)totalLabel.push(buData.progs.length+' prog');

      html+=`<div class="bu-section open">`;
      html+=`<div class="bu-header" data-brand="${esc(bu)}" onclick="toggleBUSection(this)">`;
      html+=`<svg class="bu-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;
      html+=`${esc(bu)}`;
      html+=`<span class="bu-badge" data-brand="${esc(bu)}">${totalLabel.join(' · ')}</span>`;
      html+=`</div><div class="bu-body">`;

      // Program cards
      for(const p of buData.progs){
        html+=renderProgCard(p);
      }

      // Co-op tables
      for(const cat of cats){
        const rows=buData.coop[cat];
        html+=`<div class="cat-header">${esc(cat)}</div>`;
        html+=`<table class="product-table"><thead><tr>`;
        html+=`<th style="width:22%">Product</th><th style="width:20%">Reimbursement</th><th style="width:16%">Level of Service</th><th style="width:12%">Graphic Type</th><th style="width:20%">Certified Program</th><th style="width:10%">Updated</th>`;
        html+=`</tr></thead><tbody>`;
        for(const r of rows){
          html+=`<tr><td>${esc(r.product)}</td>`;
          html+=`<td class="reimb-cell">${esc(r.reimbursement)}</td>`;
          html+=`<td>${r.level_of_service?`<span class="cell-tag orange">${esc(r.level_of_service)}</span>`:'<span class="cell-na">\u2014</span>'}</td>`;
          html+=`<td>${r.graphic_type?esc(r.graphic_type):'<span class="cell-na">\u2014</span>'}</td>`;
          html+=`<td>${r.certified_program?esc(r.certified_program):'<span class="cell-na">\u2014</span>'}</td>`;
          html+=`<td class="updated-cell">${r.updated||'\u2014'}</td></tr>`;
        }
        html+=`</tbody></table>`;
      }
      html+=`</div></div>`;
    }
    html+=`</div></div>`;
  }
  grid.innerHTML=html;
}

function renderProgCard(p){
  let h=`<div class="prog-card">`;
  h+=`<div class="prog-top">`;
  h+=`<span class="prog-status">${esc(p.status||'')}</span>`;
  if(p.cert){
    const cls=p.cert.toLowerCase().includes('endorsed')?'cert-endorsed':
              p.cert.toLowerCase().includes('exclusive')?'cert-exclusive':
              p.cert.toLowerCase().includes('co-op')?'cert-coop':
              p.cert.toLowerCase().includes('d2d')?'cert-d2d':'cert-certified';
    h+=`<span class="prog-cert-badge ${cls}">${esc(p.cert)}</span>`;
  }
  if(p.coop)h+=`<span class="prog-coop-tag">Co-op Eligible</span>`;
  h+=`</div>`;

  // Products
  if(p.products&&Object.keys(p.products).length){
    h+=`<div class="prog-section-label">Products</div><div class="prog-products">`;
    for(const[name,status] of Object.entries(p.products)){
      const isCoop=status.toLowerCase().includes('co-op')||status.toLowerCase().includes('coop');
      h+=`<span class="prog-prod-chip${isCoop?' coop-prod':''}" title="${esc(status)}">${esc(name)}</span>`;
    }
    h+=`</div>`;
  }

  const hasDetails=p.coopDetails||p.howItWorks||(p.benefits&&p.benefits.length)||(p.integrations&&p.integrations.length)||(p.pitchPoints&&p.pitchPoints.length);
  if(hasDetails){
    h+=`<div class="prog-details">`;
    h+=`<div class="prog-grid">`;

    // Left column
    h+=`<div>`;
    if(p.coopDetails){
      h+=`<div class="prog-section-label">Co-op Details</div>`;
      h+=`<div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px">${esc(String(p.coopDetails)).substring(0,500)}</div>`;
    }
    if(p.howItWorks){
      h+=`<div class="prog-section-label">How It Works</div>`;
      h+=`<div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px">${esc(p.howItWorks)}</div>`;
    }
    h+=`</div>`;

    // Right column
    h+=`<div>`;
    if(p.benefits&&p.benefits.length){
      h+=`<div class="prog-section-label">Benefits</div><ul class="prog-benefits">`;
      p.benefits.forEach(b=>h+=`<li>${esc(b)}</li>`);
      h+=`</ul>`;
    }
    if(p.pitchPoints&&p.pitchPoints.length){
      h+=`<div class="prog-section-label" style="margin-top:6px">Pitch Points</div><ul class="prog-benefits">`;
      p.pitchPoints.forEach(pt=>h+=`<li>${esc(pt)}</li>`);
      h+=`</ul>`;
    }
    if(p.integrations&&p.integrations.length){
      h+=`<div class="prog-section-label" style="margin-top:6px">Integrations</div>`;
      h+=`<div class="prog-integrations">${p.integrations.map(i=>esc(i)).join(', ')}</div>`;
    }
    h+=`</div></div></div>`;
  }

  h+=`</div>`;
  return h;
}

function toggleCard(el){el.closest('.oem-card').classList.toggle('open')}
function toggleBUSection(el){el.closest('.bu-section').classList.toggle('open')}

// ── DARK MODE ──
(function(){
  const saved=localStorage.getItem('coop-dark');
  if(saved==='true')document.documentElement.setAttribute('data-theme','dark');
  updateIcon();
  document.getElementById('darkToggle').addEventListener('click',()=>{
    const isDark=document.documentElement.getAttribute('data-theme')==='dark';
    if(isDark){document.documentElement.removeAttribute('data-theme');localStorage.setItem('coop-dark','false')}
    else{document.documentElement.setAttribute('data-theme','dark');localStorage.setItem('coop-dark','true')}
    updateIcon();
  });
  function updateIcon(){
    const d=document.documentElement.getAttribute('data-theme')==='dark';
    document.getElementById('sunIcon').style.display=d?'none':'block';
    document.getElementById('moonIcon').style.display=d?'block':'none';
  }
})();

document.getElementById('expandAllBtn').addEventListener('click',()=>{
  allExpanded=!allExpanded;
  document.getElementById('expandAllBtn').textContent=allExpanded?'Collapse All':'Expand All';
  document.querySelectorAll('.oem-card').forEach(c=>c.classList.toggle('open',allExpanded));
  if(allExpanded)document.querySelectorAll('.bu-section').forEach(s=>s.classList.add('open'));
});
document.getElementById('searchInput').addEventListener('input',e=>{searchTerm=e.target.value.trim();render()});

makeChips('buChips',ALL_BUS,toggleBU);
makeChips('oemChips',ALL_OEMS,toggleOEM);
makeViewChips();
render();
</script>
